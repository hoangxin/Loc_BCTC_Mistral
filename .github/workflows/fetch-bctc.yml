name: Fetch BCTC

# Kich hoat tu app/api/trigger-fetch (mode=term) va app/api/custom-source
# (mode=custom) qua GitHub REST API dispatch (POST .../actions/workflows/
# fetch-bctc.yml/dispatches) - dung PAT GITHUB_DISPATCH_TOKEN, KHONG dung
# repository_dispatch/webhook. Theo dung khung .github/workflows/news-digest.yml
# cua 3 project cu cung tac gia (D:\AI\loc_tin, Loc_Tin_Mistral, loc_tin_qwen) -
# da xac nhan qua git log that la mo hinh nay hoat dong dung.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'term (tai hang loat theo ky) hoac custom (nguon rieng)'
        default: 'term'
        type: string
      reportTermID:
        type: string
        default: ''
      yearPeriod:
        type: string
        default: ''
      description:
        type: string
        default: ''
      onlyMissing:
        description: '1 = chi tai bu bao cao chua co san (Tu lan tai cuoi), bat ke thoi gian xuat hien'
        type: string
        default: ''
      reportLimit:
        type: string
        default: ''
      selectedIds:
        type: string
        default: ''
      customUrl:
        type: string
        default: ''
      requestId:
        type: string
        default: ''
      clearFilePaths:
        description: 'mode=clear: danh sach filePath can xoa rieng (phan cach dau phay). Rong = xoa toan bo.'
        type: string
        default: ''
      ocrMode:
        description: 'sync (goi API /v1/ocr truc tiep) hoac batch (mac dinh, re hon nhung dang phu thuoc hang doi Mistral)'
        type: string
        default: 'batch'

permissions:
  contents: write

# Xep hang thay vi chay chong (VD user bam "Tai BCTC" 2 lan lien tiep) - GitHub
# tu lo, khong can bien "isRunning" in-memory nhu ban serverless cu.
concurrency:
  group: fetch-bctc
  cancel-in-progress: false

jobs:
  run-fetch:
    runs-on: ubuntu-latest
    # Lau hon 15 phut cua news-digest.yml (chi scrape tin) vi pipeline nay OCR
    # Mistral cho hang chuc bao cao/lan chay. NANG tu 60 len 120 phut
    # (2026-07-20, su co Mistral batch nghen keo dai ca buoi chieu): 60 phut
    # xung khac truc tiep voi MAX_POLL_DURATION_MS=45 phut (lib/ai/mistral-
    # ocr-batch.ts) - chi can 2 bao cao ket lien tiep tren CUNG 1 worker la
    # chac chan cham tran cu, huy ca job du flushProgress da giu duoc tien do.
    # Day KHONG phai gioi han cung cua GitHub (runner do GitHub host cho phep
    # toi 360 phut/job) - la con so tu chon, nen nang duoc tu do.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Run fetch pipeline
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_OCR_MODEL: ${{ secrets.MISTRAL_OCR_MODEL }}
          MISTRAL_CHAT_MODEL: ${{ secrets.MISTRAL_CHAT_MODEL }}
          FETCH_MODE: ${{ github.event.inputs.mode }}
          FETCH_REPORT_TERM_ID: ${{ github.event.inputs.reportTermID }}
          FETCH_YEAR_PERIOD: ${{ github.event.inputs.yearPeriod }}
          FETCH_DESCRIPTION: ${{ github.event.inputs.description }}
          FETCH_ONLY_MISSING: ${{ github.event.inputs.onlyMissing }}
          FETCH_REPORT_LIMIT: ${{ github.event.inputs.reportLimit }}
          FETCH_SELECTED_IDS: ${{ github.event.inputs.selectedIds }}
          FETCH_CUSTOM_URL: ${{ github.event.inputs.customUrl }}
          FETCH_REQUEST_ID: ${{ github.event.inputs.requestId }}
          FETCH_CLEAR_FILE_PATHS: ${{ github.event.inputs.clearFilePaths }}
          FETCH_OCR_MODE: ${{ github.event.inputs.ocrMode }}
        run: npx tsx scripts/run-fetch.ts
      # Commit data/latest-fetch.json neu co thay doi - cu push nay tu khien
      # Vercel deploy lai (Git integration mac dinh), day la cach client
      # (app/FetchControls.tsx, app/CustomSourceForm.tsx) biet "da xong" (poll
      # generatedAt/lastCustomSourceCheck doi).
      #
      # data/ocr-markdown/**: them 2026-07-16 (theo yeu cau nguoi dung) - luu
      # kem markdown OCR THO cua tung bao cao (lib/ocr-markdown-store.ts, GHI
      # DE theo ma+ky nen khong phinh theo lich su) de debug/dieu tra sau nay
      # (vd LCTT rong tren live) KHONG can OCR that lan 2.
      #
      # if: always() them 2026-07-20 (yeu cau nguoi dung, sau su co Mistral
      # nghen hang doi lam ca batch chay lau): mac dinh GitHub Actions SKIP
      # cac buoc con lai neu job bi HUY (vd cham timeout-minutes: 60 o tren) -
      # truoc day nghia la data/latest-fetch.json tren dia (du lib/pipeline.ts
      # da flush tung bao cao MOT xuong dia, xem flushProgress) KHONG BAO GIO
      # duoc commit len git khi bi huy, mat het tien do. always() dam bao buoc
      # nay VAN chay du job thanh cong/loi/bi huy - git-auto-commit-action tu
      # kiem tra `git diff`, khong co gi thay doi thi khong tao commit rong.
      #
      # SUA 2026-07-20 (yeu cau nguoi dung, sau su co that: push code sua
      # loi tu local ngay LUC job nay dang chay khien buoc commit ben duoi bi
      # GitHub tu choi "non-fast-forward" - checkout luc dau job da CU hon
      # nhieu so voi origin/main sau khi pipeline chay xong, co the mat toi
      # 60 phut): dong bo lai voi origin/main NGAY TRUOC khi commit.
      # --autostash tu cat tam data/latest-fetch.json/ocr-markdown DANG SUA
      # (chua commit) qua 1 ben, rebase, roi khoi phuc lai - khong bi chan
      # boi working tree co thay doi.
      #
      # CAP NHAT 2026-07-21 (su co that: 1 lan chay 20 bao cao that bai dung
      # buoc nay): gia dinh goc o tren ("code push tu local KHONG dung data/
      # latest-fetch.json") bi PHA VO - 1 phien Claude Code chay
      # scripts/resync-cache.ts (ghi lai TOAN BO field `analysis` cho MOI bao
      # cao) roi push THANG len main trong luc job nay dang o dung buoc nay,
      # ~3 giay truoc. --autostash khong the tu gop 2 thay doi CHONG LAN THAT
      # SU len nhau (khac tinh huong 20/7 chi la lech nhanh/cham, khong co noi
      # dung xung dot that) - de lai git index o trang thai "needs merge",
      # lam buoc "Commit updated status" duoi fail cung (loi "Invalid status
      # code: 1"), MAT LUON toan bo 20 bao cao vua chay (runner bi huy ngay
      # sau khi job xong, khong con cach nao lay lai tu `git stash`).
      #
      # 2 lop phong ngua (khong co lop nao thay the lop kia):
      # 1. (quy trinh, ngoai code) Truoc khi push bat ky thay doi nao dung
      #    data/latest-fetch.json tu local/Claude Code, PHAI kiem tra truoc
      #    xem workflow nay co dang chay khong (GET .../actions/workflows/
      #    fetch-bctc.yml/runs?status=in_progress, mien phi, khong can token
      #    vi repo public) - day la NGUYEN NHAN GOC, sua o day la chinh.
      # 2. (code, buoc duoi) Luu ket qua THO ra artifact TRUOC khi thu
      #    dong bo/commit - du buoc dong bo/commit co that bai vi BAT KY ly do
      #    gi (khong chi truong hop nay), ket qua cua LAN CHAY NAY van lay lai
      #    duoc tu artifact (giu 7 ngay) thay vi mat trang hoan toan.
      - name: Luu ket qua tho ra artifact (phong khi buoc dong bo/commit ben duoi that bai)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-result-backup-${{ github.run_id }}
          path: |
            data/latest-fetch.json
            data/ocr-markdown/**
          retention-days: 7
          if-no-files-found: ignore
      - name: Sync voi origin/main truoc khi commit
        if: always()
        run: |
          if git pull --rebase --autostash origin main; then
            exit 0
          fi
          echo "::warning::git pull --rebase --autostash xung dot that su voi 1 thay doi khac tren main (khong phai loi tam thoi, khong the tu dong gop duoc) - huy dong bo, ket qua LAN CHAY NAY van con trong artifact 'fetch-result-backup-${{ github.run_id }}' o tren, chua bi mat, nhung se KHONG duoc tu dong commit len data/latest-fetch.json. Can tai artifact ve gop tay."
          git rebase --abort 2>/dev/null || true
          git reset --hard origin/main
      - name: Commit updated status
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: cap nhat ket qua BCTC'
          file_pattern: data/latest-fetch.json data/ocr-markdown/**
